
services:
  api: &api
    build:
      context: .
      dockerfile: ./docker/local/django/Dockerfile
    image: estate_prod_api
    container_name: estate_prod_api
    volumes:
      - .:/app:z
      - ./staticfiles:/app/staticfiles
    # ports:
    #  - "8000:8000"
    expose:
      - "8000"
    env_file:
      - .envs/.env.local/.django
      - .envs/.env.local/.postgres
    environment:
      # watchfiles detects changes reliably on Docker Desktop bind mounts (uses polling).
      - WATCHFILES_FORCE_POLLING=1
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    command: /start
    networks:
      - estate_prod_nw

  postgres:
    build:
      context: .
      dockerfile: ./docker/local/postgres/Dockerfile
    image: estate_prod_postgres
    container_name: estate_prod_postgres
    ports:
      - "5432:5432"
    volumes:
      - estate_prod_postgres_data:/var/lib/postgresql/data
    env_file:
      - ./.envs/.env.local/.postgres
    # So api/celery start only after Postgres accepts connections (not just container start)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - estate_prod_nw

  mailpit:
    image: docker.io/axllent/mailpit:v1.15
    container_name: estate_prod_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    volumes:  
      - estate_prod_mailpit_data:/data
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATA_FILE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1  
    networks:
      - estate_prod_nw

  client:
    build:
      context: ./client
      dockerfile: ./docker/local/Dockerfile
    container_name: estate_client
    image: estate_client
    # ports:
    #  - "3000:3000"
    expose:
      - "3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      # Keep Next's .next output off the bind mount (avoids corrupt webpack cache: ENOENT middleware-manifest, missing chunk *.js on Mac/Win Docker)
      - client_next_dev:/app/.next
    # Reliable hot reload via polling for bind mounts (Docker Desktop Mac/Win/WSL2).
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    networks:
      - estate_prod_nw
  
  redis:
    image: redis:7.0-alpine3.19
    command: redis-server --appendonly yes
    container_name: estate_redis
    volumes:
      - estate_redis_prod_data:/data
    networks:
      - estate_prod_nw

  celeryworker:
    <<: *api
    image: estate_prod_celeryworker
    container_name: estate_prod_celeryworker
    command: /start-celeryworker

  celerybeat:
    <<: *api
    image: estate_prod_celerybeat
    container_name: estate_prod_celerybeat
    command: "/start-celerybeat"

  flower:
    <<: *api
    image: estate_prod_flower
    container_name: estate_prod_flower
    ports:
      - "5555:5555"
    command: /start-flower    

  nginx:
    build:
      context: ./docker/local/nginx
      dockerfile: Dockerfile
    restart: always
    container_name: estate_nginx
    ports:
      - "8080:80"
    volumes:
      - ./staticfiles:/app/staticfiles
      - logs_store:/var/log/nginx
    depends_on:
      - api
      - client
    networks:
      - estate_prod_nw


networks:
  estate_prod_nw:
    external: true

volumes:
  estate_prod_postgres_data: {}
  estate_prod_mailpit_data: {}
  logs_store: {}
  estate_redis_prod_data: {}
  client_next_dev: {}
  